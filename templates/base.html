<!DOCTYPE html>
<html lang="{% if lang == "en" %}en{% else %}zh-Hans{% endif %}">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        {% block title %}
            <title>/home/ksqsf</title>
        {% endblock %}

        <link rel="stylesheet" href="{{ get_url(path="main.css", trailing_slash=false) }}">

        <!-- Favicon -->
        <link rel="icon" href="{{ config.extra.favicon }}">

        <!-- Feed -->
        <link type="application/rss+xml" rel="alternate" href="{{ get_url(path="rss.xml", lang=lang, trailing_slash=false) }}" title="/home/ksqsf">

        {% block head %}
        {% endblock %}
    </head>

    <body>
        <header class="site-header">
            <a class="site-title" href="{{ get_url(path="", lang=lang) }}">/home/ksqsf</a>
            <nav class="site-nav">
                <ul>
                    <li><a class="page-link" href="{{ get_url(path="posts", lang=lang) }}">Posts</a></li>
                    <li><a class="page-link" href="{{ get_url(path="about", lang=lang) }}">About</a></li>
                    <li><a class="page-link" href="{{ get_url(path="links", lang=lang) }}">Links</a></li>
                </ul>
            </nav>
        </header>

        <main aria-label="Content" lang="{% if lang == "en" %}en{% else %}zh-Hans{% endif %}">
            {% block content %}
            {% endblock %}
        </main>
    </body>

    <footer class="site-footer">
        {% block footer %}
            <small><a href="{{ get_url(path="rss.xml", lang=lang, trailing_slash=false) }}">RSS</a></small>
        {% endblock %}
    </footer>
</html>
